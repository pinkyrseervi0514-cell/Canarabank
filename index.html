<!doctype html><html><head><meta charset='utf-8'>
<link rel='stylesheet' href='style.css'><title>My Sample Bank</title></head>
<body>
<header><img src='logo.png' height='50'><div>Secure Internet Banking</div></header>
<div class='container'>
<div class='panel'>
<h2>Welcome to Canara Bank </h2>
<div class='card'><b>Government Services</b><br>DBT • Pension • Tax Payment</div>
<div class='card'><b>Digital Banking</b><br>UPI • QR • Mobile Banking</div>
<div class='card'><b>Loans</b><br>Home • Vehicle • Education</div>
<div class='card'><b>Security</b><br>Never share OTP or Password.</div>
</div>
<div class='login'>
<h2>Login</h2>
<input id='uid' placeholder='User ID'>
<input id='pwd' type='password' placeholder='Password'>
<label><input type='checkbox' onclick='togglePwd()'> Show Password</label>
<button onclick='login()'>Login</button>
</div>
</div>
<script src='script.js'></script>
</body></html>
